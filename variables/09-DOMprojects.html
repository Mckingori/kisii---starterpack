<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Projects</title>
</head>
<body>
<p>Youtube susbcribe button</p>
<button onclick="susbcribe();" class="Js-SUB-button">Susbscribe</button>

    <script>
function susbcribe() {
        const buttonElement = document.querySelector('.Js-SUB-button')


        if (buttonElement.innerText  === 'Susbscribe'){
            buttonElement.innerHTML = 'Susbcribed';
        } else {
            buttonElement.innerHTML = 'Susbcribe';
        }
}
    </script>
</body>
</html>
